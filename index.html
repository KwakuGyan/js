<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Guess the Number</title>
</head>
<body>

    <h1>Guess the Number</h1>
    <p>You have 5 tries to guess the number between 1 and 10.</p>

    <input type="number" id="guess">
    <button onclick="checkGuess()">Guess</button>

    <p id="message"></p>

    <script>
        let secret = 7; // The correct number
        let tries = 0;
        let maxTries = 5;

        function checkGuess() {
            let guess = Number(document.getElementById("guess").value);
            tries++;

            if (guess === secret) {
                document.getElementById("message").innerHTML =
                    `Well done! You used ${tries} tries.`;
            }
            else if (tries >= maxTries) {
                document.getElementById("message").innerHTML =
                    `Game over! The number was ${secret}.`;
            }
            else {
                document.getElementById("message").innerHTML =
                    `Wrong guess. You have ${maxTries - tries} tries left.`;
            }
        }
    </script>

</body>
</html>
</body>
</html>
